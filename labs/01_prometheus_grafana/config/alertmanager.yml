global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'webhook-demo'

receivers:
  - name: 'webhook-demo'
    webhook_configs:
      - url: 'http://localhost:9095/alert'
        send_resolved: true

# Koolituse ajal kasutame webhook'i — ei saada päris emaile.
# Alertid on nähtavad: http://<vm-ip>:9093
