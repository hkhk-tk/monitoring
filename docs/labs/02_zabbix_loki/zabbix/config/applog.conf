# Zabbix UserParameter — Päev 2 Labor
#
# UserParameter võimaldab agentil käivitada suvalist shell käsku
# ja tagastada tulemuse Zabbix serverile ühe mõõdikuna.
#
# Fail laaditakse `/etc/zabbix/zabbix_agentd.d/` alt automaatselt
# agent container käivitumisel. Kui muudad, restart agent:
#   docker restart zabbix-agent

# -----------------------------------------------------------------------------
# Osa 5: Custom mõõdik — ERROR ridu teenuse kohta viimase 1000 rea seas
# -----------------------------------------------------------------------------
# Kasutamine Zabbixi Item'is:
#   Key: applog.errors[payment]
#   Key: applog.errors[auth]
#
UserParameter=applog.errors[*], tail -n 1000 /var/log/app/app.log | grep -c "\[ERROR\] \[$1\]"

# -----------------------------------------------------------------------------
# Osa 5/6: Universaalsem mõõdik — ridu antud TASEME ja TEENUSE kohta
# -----------------------------------------------------------------------------
# Kasutamine:
#   Key: applog.count[ERROR,payment]
#   Key: applog.count[WARN,auth]
#   Key: applog.count[INFO,api]
#
UserParameter=applog.count[*], tail -n 1000 /var/log/app/app.log | grep -c "\[$1\] \[$2\]"

# -----------------------------------------------------------------------------
# Osa 6: LLD discovery — tagastab JSON massiivi
# -----------------------------------------------------------------------------
# Skript loeb logist ja leiab kõik unikaalsed [SEVERITY] [SERVICE] paarid.
# Zabbix kasutab {#SEVERITY} ja {#SERVICE} macrosid item prototüübis.
#
UserParameter=applog.discovery, /usr/local/bin/discover-services.sh
